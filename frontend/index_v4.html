// ===== REWARD CALCULATOR =====
function RC(){
  const v=parseInt(document.getElementById('caVolSlider').value);
  const s=parseInt(document.getElementById('caStakeSlider').value);
  const fmtV=(n)=>'$'+(n/1000).toFixed(n>=10000?1:2)+'k';
  const fmtP=(n)=>n<0.01?'< 0.01':n.toFixed(2);
  const G=85; // pGOLD USD price
  
  // Update labels
  document.getElementById('caVolVal').innerHTML=fmtV(v).replace('$','$');
  document.getElementById('caStakeVal').innerHTML=s.toLocaleString()+' <small>pGOLD</small>';
  
  // Monthly fees (0.25% × 2 for round trip)
  const monthlyFees=v*0.005;
  document.getElementById('caFeesVal').textContent='$'+monthlyFees.toFixed(2);
  
  // Track A: Holding dividends (3.5% APY, requires 100+ stake)
  const active_A=s>=100;
  const annual_A=active_A?s*0.035:0;
  
  // Track B: Top 100 monthly (300%, 10yr vest) — assumes in top 100
  const annual_B=s*3.0/10;
  
  // Track C: Burn mining — cumulative fees × 1000%, 10yr vest
  // annual C = (monthlyFees/85 × 10) / 10 = monthlyFees/85 per year
  const annual_C=monthlyFees/G;
  
  // Track D: Fee tiers — just show savings relative to 0.25%
  const tierRate=0.0025; // base rate
  const annual_D=0; // no separate D reward, it's just fee savings
  
  // Track E: Genesis pool — placeholder
  const annual_E=0;
  
  const annualTotal=annual_A+annual_B+annual_C+annual_D+annual_E;
  const totalUSD=annualTotal*G;
  
  // Build result cards
  const tracks=[
    {l:'A',n:T('ca_t_a'),v:fmtP(annual_A),sub:active_A?T('ca_a_active'):T('ca_a_inactive')},
    {l:'B',n:T('ca_t_b'),v:fmtP(annual_B),sub:T('ca_b_assume')},
    {l:'C',n:T('ca_t_c'),v:fmtP(annual_C),sub:T('ca_c_desc')},
    {l:'D',n:T('ca_t_d'),v:T('ca_d_auto'),sub:''},
    {l:'E',n:T('ca_t_e'),v:T('ca_e_goto'),sub:''}
  ];
  document.getElementById('caResults').innerHTML=tracks.map(t=>`
    <div class="calc-r-card">
      <div class="calc-r-letter">${t.l}</div>
      <div class="calc-r-track">${t.n}</div>
      <div class="calc-r-val">${t.v}</div>
      <div class="calc-r-unit">pGOLD</div>
      ${t.sub?`<div class="calc-r-sub">${t.sub}</div>`:''}
    </div>
  `).join('');
  
  document.getElementById('caTotalVal').innerHTML=fmtP(annualTotal)+' pGOLD ≈ $'+(annualTotal*G).toLocaleString('en-US',{maximumFractionDigits:0});
  
  // If staking < 100, show inactive for track A
}
